apiVersion: batch/v1
kind: CronJob
metadata:
  name: nemesis-db-backup
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: pg-backup
              image: timescale/timescaledb:latest-pg16
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  pg_dump -Fc -f /backup/nemesis_${TIMESTAMP}.dump "$DATABASE_URL"
                  find /backup -name "*.dump" -mtime +7 -delete
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: nemesis-db-creds
                      key: url
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          restartPolicy: OnFailure
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: nemesis-backup-pvc
