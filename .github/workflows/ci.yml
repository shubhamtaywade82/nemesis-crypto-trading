name: Nemesis CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: nemesis_test
          POSTGRES_USER: nemesis
          POSTGRES_PASSWORD: nemesis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Format check
        working-directory: crates
        run: cargo fmt --all -- --check

      - name: Clippy lint
        working-directory: crates
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        working-directory: crates
        env:
          DATABASE_URL: postgres://nemesis:nemesis_test@localhost:5432/nemesis_test
        run: cargo test --all -- --test-threads=1

      - name: Copy Cargo.lock for audit
        run: cp crates/Cargo.lock ./Cargo.lock

      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  python-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: python/nemesis_alpha
        run: pip install -e ".[dev]"

      - name: Generate protos
        working-directory: python/nemesis_alpha
        run: python scripts/generate_proto.py

      - name: Type check
        working-directory: python/nemesis_alpha
        run: mypy src/

      - name: Run tests
        working-directory: python/nemesis_alpha
        run: pytest tests/ -v || test $? -eq 5

  docker-build:
    needs: [rust-ci, python-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: false
          tags: nemesis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-mainnet:
    needs: [docker-build]
    runs-on: ubuntu-latest
    environment: mainnet
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to mainnet
        run: echo "Deploy approved — trigger deployment pipeline"
